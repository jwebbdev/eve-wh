# Wormhole Combat Site Wave Data - C3 and C4
# Source: Eve University Wiki (https://wiki.eveuniversity.org)
# Extracted: 2026-04-06
#
# NPC classes: frigate, cruiser, battleship, sentry
# Threats: web, scram, neut, rr (remote repair)
# DPS = turret + missile combined
# EHP = effective hit points
# Trigger = killing last of this NPC type spawns next wave

