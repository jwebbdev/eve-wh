# Moon mining in wormholes
moon_mining:
  note: "Only R4 (ubiquitous) and R8 (common) moon ores spawn on WH moons. No R16/R32/R64."
  available_ores:
    ubiquitous_r4: [Zeolites, Sylvite, Bitumite, Coesite]
    common_r8: [Cobaltite, Euxenite, Titanite, Scheelite]

# Ice mining
ice_mining:
  note: "Ice anomalies do not spawn in standard wormhole systems."
