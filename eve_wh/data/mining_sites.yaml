# Wormhole Mining/Ore Sites Database
# Source: EVE University Wiki (individual site pages, April 2026)
# All ore sites are anomalies (show on probe scanner)
# Additional asteroids spawn over the site's 3-5 day lifetime
#
# The 11 named ore sites that appear on probe scanner (user's list):
#   Common Perimeter Deposit, Ordinary Perimeter Deposit,
#   Average Frontier Deposit, Unexceptional Frontier Deposit,
#   Exceptional Core Deposit, Infrequent Core Deposit,
#   Isolated Core Deposit, Rarified Core Deposit,
#   Uncommon Core Deposit, Unusual Core Deposit,
#   Shattered Debris Field
# Plus: Shattered Ice Field (ice, shattered WHs only)

