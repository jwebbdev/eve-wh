# Wormhole Mining/Ore Sites Database
# Source: EVE University Wiki + community data
# All ore sites are anomalies (no scanning required, show on probe scanner)
# Sleeper NPCs must be cleared before mining
#
# tier order: ordinary < common < uncommon < average < infrequent < unusual < exceptional < rarified

ore_sites:
  # === C1/C2 PERIMETER DEPOSITS ===
  - name: Ordinary Perimeter Deposit
    classes: [1, 2]
    tier: ordinary
    ores: [Veldspar, Scordite, Pyroxeres]
    sleeper_difficulty: low

  - name: Common Perimeter Deposit
    classes: [1, 2]
    tier: common
    ores: [Veldspar, Scordite, Pyroxeres, Plagioclase]
    sleeper_difficulty: low

  - name: Uncommon Perimeter Deposit
    classes: [1, 2]
    tier: uncommon
    ores: [Scordite, Pyroxeres, Plagioclase, Omber]
    sleeper_difficulty: low

  - name: Average Perimeter Deposit
    classes: [1, 2]
    tier: average
    ores: [Pyroxeres, Plagioclase, Omber, Kernite]
    sleeper_difficulty: low

  - name: Infrequent Perimeter Deposit
    classes: [1, 2]
    tier: infrequent
    ores: [Plagioclase, Omber, Kernite, Jaspet]
    sleeper_difficulty: low

  - name: Unusual Perimeter Deposit
    classes: [1, 2]
    tier: unusual
    ores: [Omber, Kernite, Jaspet, Hemorphite]
    sleeper_difficulty: low

  - name: Exceptional Perimeter Deposit
    classes: [1, 2]
    tier: exceptional
    ores: [Hemorphite, Hedbergite, Gneiss, Dark Ochre]
    sleeper_difficulty: low

  - name: Rarified Perimeter Deposit
    classes: [1, 2]
    tier: rarified
    ores: [Hedbergite, Gneiss, Dark Ochre, Crokite]
    sleeper_difficulty: low

