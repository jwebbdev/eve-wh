    classes: [1, 2, 3]
    tier: ordinary
    ores: [Scordite, Pyroxeres, Plagioclase]
    sleeper_difficulty: low

  - name: Common Frontier Deposit
    classes: [1, 2, 3]
    tier: common
    ores: [Pyroxeres, Plagioclase, Omber, Kernite]
    sleeper_difficulty: low

  - name: Uncommon Frontier Deposit
    classes: [1, 2, 3]
    tier: uncommon
    ores: [Plagioclase, Omber, Kernite, Jaspet]
    sleeper_difficulty: medium

  - name: Average Frontier Deposit
    classes: [1, 2, 3]
    tier: average
    ores: [Omber, Kernite, Jaspet, Hemorphite]
    sleeper_difficulty: medium

  - name: Infrequent Frontier Deposit
    classes: [2, 3]
    tier: infrequent
    ores: [Kernite, Jaspet, Hemorphite, Hedbergite]
    sleeper_difficulty: medium

  - name: Unusual Frontier Deposit
    classes: [2, 3]
    tier: unusual
    ores: [Jaspet, Hemorphite, Hedbergite, Gneiss]
    sleeper_difficulty: medium

  - name: Exceptional Frontier Deposit
    classes: [2, 3]
    tier: exceptional
    ores: [Hedbergite, Gneiss, Dark Ochre, Crokite]
    sleeper_difficulty: medium

  - name: Rarified Frontier Deposit
