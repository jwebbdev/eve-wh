# Wormhole Combat Sites Database
# Source: EVE University Wiki + Rykki Atruin spreadsheet (cross-referenced)
# Blue loot values are fixed ISK drops per site
# Salvage estimates are community averages (nanoribbon prices vary)
#
# type: anomaly | data | relic
# threats: neut, scram, web, rr (remote rep), ecm
# trigger: which NPC triggers the next wave (null = last wave or random triggers)
#
# NPC taxonomy:
#   Emergent = frigate class
#   Awakened = cruiser class
#   Sleepless = battleship class
#   Sentry towers = stationary
#
# DPS = turret_dps + missile_dps (combined per NPC)
# total_dps = sum of all NPC DPS in that wave (excludes sentry towers unless noted)

# NPC reference (DPS per ship, threats):
npc_reference:
  # Frigates (Emergent)
  Emergent Defender:     { class: frigate, dps: 24, threats: [web] }
