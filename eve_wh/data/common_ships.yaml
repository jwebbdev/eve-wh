# Common Rolling Ships
# All masses in kg
# cold_mass: base ship mass (no prop mod)
# hot_mass: mass with MWD active
# zpm_mass: mass with Zero-Point Mass Entangler active (HICs only, null = N/A)
#
# Players can add custom ships with any name and mass values.

ships:
  - name: Praxis
    cold_mass: 200000000
    hot_mass: 300000000

  - name: Sigil
    cold_mass: 11000000
    hot_mass: 61000000

  - name: Broadsword
    cold_mass: 30000000
    hot_mass: 130000000
    zpm_mass: 1000000
